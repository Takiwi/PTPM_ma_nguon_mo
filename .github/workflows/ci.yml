name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=cogs --cov-report=xml --cov-report=term-missing

      - name: Debug coverage
        run: |
          echo "=== repo root ==="
          ls -la
          echo "=== first lines of coverage.xml ==="
          head -n 60 coverage.xml || true
          echo "=== filenames listed in coverage.xml (grep) ==="
          grep 'filename=' coverage.xml | sed -n '1,40p' || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600

        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}